[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=24,16,10,220

[Metadata]
Name=Gaming Lab Creator
Author=Gaming Lab
Information=Balanced creator desktop with quick access and light monitoring.
Version=1.0

[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureDate]
Measure=Time
Format=%d.%m.%Y

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=Memory

[Title]
Meter=String
X=18
Y=18
FontFace=Segoe UI Semibold
FontSize=20
FontColor=255,138,61,255
Text=Gaming Lab // Creator

[Clock]
Meter=String
MeasureName=MeasureTime
X=18
Y=54
FontFace=Segoe UI
FontSize=28
FontColor=240,245,255,255

[Date]
Meter=String
MeasureName=MeasureDate
X=18
Y=92
FontFace=Segoe UI
FontSize=11
FontColor=230,180,145,255

[Divider]
Meter=Shape
X=18
Y=124
Shape=Line 0,0,280,0 | StrokeWidth 1 | Stroke Color 255,138,61,180

[Cpu]
Meter=String
MeasureName=MeasureCPU
X=18
Y=150
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=CPU %1%

[Ram]
Meter=String
MeasureName=MeasureRAM
X=120
Y=150
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=RAM %1%

[VSCode]
Meter=String
X=18
Y=214
FontFace=Segoe UI Semibold
FontSize=12
FontColor=255,138,61,255
Text=Open VS Code
LeftMouseUpAction=["code"]

[Chrome]
Meter=String
X=18
Y=236
FontFace=Segoe UI
FontSize=12
FontColor=235,235,235,255
Text=Open Chrome
LeftMouseUpAction=["chrome"]

[OBS]
Meter=String
X=18
Y=258
FontFace=Segoe UI
FontSize=12
FontColor=235,235,235,255
Text=Open OBS
LeftMouseUpAction=["obs64.exe"]
