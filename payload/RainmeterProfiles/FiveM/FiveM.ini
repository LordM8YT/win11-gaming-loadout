[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=13,10,25,220

[Metadata]
Name=Gaming Lab FiveM
Author=Gaming Lab
Information=Cyber Rainmeter desktop for the FiveM profile.
Version=1.0

[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureDate]
Measure=Time
Format=%A

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=Memory

[Title]
Meter=String
X=18
Y=18
FontFace=Segoe UI Semibold
FontSize=20
FontColor=103,78,255,255
Text=Gaming Lab // FiveM

[Clock]
Meter=String
MeasureName=MeasureTime
X=18
Y=54
FontFace=Segoe UI
FontSize=28
FontColor=240,245,255,255

[Date]
Meter=String
MeasureName=MeasureDate
X=18
Y=92
FontFace=Segoe UI
FontSize=11
FontColor=180,170,235,255

[Divider]
Meter=Shape
X=18
Y=124
Shape=Line 0,0,250,0 | StrokeWidth 1 | Stroke Color 103,78,255,180

[Cpu]
Meter=String
MeasureName=MeasureCPU
X=18
Y=150
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=CPU %1%

[Ram]
Meter=String
MeasureName=MeasureRAM
X=18
Y=176
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=RAM %1%

[Steam]
Meter=String
X=18
Y=214
FontFace=Segoe UI Semibold
FontSize=12
FontColor=103,78,255,255
Text=Launch Steam
LeftMouseUpAction=["steam://open/main"]

[Discord]
Meter=String
X=18
Y=236
FontFace=Segoe UI
FontSize=12
FontColor=230,230,250,255
Text=Open Discord
LeftMouseUpAction=["discord://-/channels/@me"]

[Files]
Meter=String
X=18
Y=258
FontFace=Segoe UI
FontSize=12
FontColor=230,230,250,255
Text=Open Files
LeftMouseUpAction=["explorer.exe"]
