[Clock]
Meter=String
MeasureName=MeasureTime
X=18
Y=54
FontFace=Segoe UI
FontSize=28
FontColor=240,245,255,255

[Date]
Meter=String
MeasureName=MeasureDate
X=18
Y=92
FontFace=Segoe UI
FontSize=11
FontColor=150,170,200,255

[Divider]
