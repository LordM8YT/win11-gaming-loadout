X=18
Y=124
Shape=Line 0,0,250,0 | StrokeWidth 1 | Stroke Color 28,224,182,180

[CpuLabel]
Meter=String
X=18
Y=140
FontFace=Segoe UI
FontSize=11
FontColor=150,170,200,255
Text=CPU

[CpuValue]
Meter=String
MeasureName=MeasureCPU
X=18
Y=158
FontFace=Consolas
FontSize=18
FontColor=240,245,255,255
