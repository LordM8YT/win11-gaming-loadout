[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=9,12,18,220

[Metadata]
Name=Gaming Lab Competitive
Author=Gaming Lab
Information=Minimal Rainmeter desktop for the Competitive profile.
Version=1.0

[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureDate]
Measure=Time
Format=%d.%m.%Y

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=Memory

[Title]
Meter=String
X=18
Y=18
FontFace=Segoe UI Semibold
FontSize=20
FontColor=28,224,182,255
