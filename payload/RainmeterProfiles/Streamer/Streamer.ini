[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=8,18,17,220

[Metadata]
Name=Gaming Lab Streamer
Author=Gaming Lab
Information=Streaming focused Rainmeter desktop for OBS and Discord workflows.
Version=1.0

[MeasureTime]
Measure=Time
Format=%H:%M

[MeasureDate]
Measure=Time
Format=%d.%m.%Y

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=Memory

[MeasureUptime]
Measure=Uptime
Format=%4!i!h %3!i!m

[Title]
Meter=String
X=18
Y=18
FontFace=Segoe UI Semibold
FontSize=20
FontColor=35,209,139,255
Text=Gaming Lab // Streamer

[Clock]
Meter=String
MeasureName=MeasureTime
X=18
Y=54
FontFace=Segoe UI
FontSize=28
FontColor=240,245,255,255

[Date]
Meter=String
MeasureName=MeasureDate
X=18
Y=92
FontFace=Segoe UI
FontSize=11
FontColor=150,210,190,255

[Divider]
Meter=Shape
X=18
Y=124
Shape=Line 0,0,280,0 | StrokeWidth 1 | Stroke Color 35,209,139,180

[Cpu]
Meter=String
MeasureName=MeasureCPU
X=18
Y=150
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=CPU %1%

[Ram]
Meter=String
MeasureName=MeasureRAM
X=120
Y=150
FontFace=Consolas
FontSize=16
FontColor=255,255,255,255
Text=RAM %1%

[Uptime]
Meter=String
MeasureName=MeasureUptime
X=18
Y=176
FontFace=Consolas
FontSize=14
FontColor=210,220,230,255
Text=Up %1

[Obs]
Meter=String
X=18
Y=214
FontFace=Segoe UI Semibold
FontSize=12
FontColor=35,209,139,255
Text=Open OBS
LeftMouseUpAction=["obs64.exe"]

[Discord]
Meter=String
X=18
Y=236
FontFace=Segoe UI
FontSize=12
FontColor=230,240,245,255
Text=Open Discord
LeftMouseUpAction=["discord://-/channels/@me"]

[Steam]
Meter=String
X=18
Y=258
FontFace=Segoe UI
FontSize=12
FontColor=230,240,245,255
Text=Open Steam
LeftMouseUpAction=["steam://open/main"]
